<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webapp Down - ZKillQuery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .down-icon {
            font-size: 5rem;
            color: #e74c3c;
        }
    </style>
</head>
<body>
    <div class="container text-center">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <i class="bi bi-power down-icon mb-4"></i>
                <h1 class="display-4 mb-3">Webapp is Down</h1>
                <p class="lead text-muted mb-4">
                    The ZKillQuery web application has been shut down.
                </p>
                <p class="text-muted">
                    To restart, run <code>./webapp.sh</code> from the command line.
                </p>
                <a href="/" class="btn btn-primary">Go to Dashboard</a>
            </div>
        </div>
    </div>
</body>
</html>
